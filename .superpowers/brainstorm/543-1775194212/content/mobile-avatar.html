<style>
  body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; }
  .page-title { font-size: 1.1rem; font-weight: 600; color: #2c1a0e; margin-bottom: 0.25rem; }
  .page-sub { font-size: 0.85rem; color: #8b5e3c; margin-bottom: 2rem; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }

  /* Desktop preview */
  .desktop-wrap { }
  .section-label {
    font-size: 0.7rem; font-weight: 700; color: #8b5e3c;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .desktop-mock {
    background: #faf6f0;
    border-radius: 10px;
    padding: 0.75rem;
  }
  .bio-desktop {
    display: flex;
    align-items: stretch;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border-left: 3px solid #b07848;
    box-shadow: 0 1px 8px rgba(44,26,14,0.09);
    min-height: 170px;
  }
  .text-col {
    flex: 1;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }
  .badge {
    display: inline-block;
    background: #f0e6d8; color: #8b5e3c;
    font-size: 0.58rem; font-weight: 700;
    padding: 0.15rem 0.5rem; border-radius: 10px;
    margin-bottom: 0.3rem;
    width: fit-content;
  }
  .name { font-size: 1.1rem; font-weight: 700; color: #2c1a0e; line-height: 1.2; }
  .title { font-size: 0.62rem; color: #8b5e3c; margin-top: 0.1rem; }
  .divider { height: 1px; background: #e8ddd4; margin: 0.5rem 0; }
  .lines div { height: 4px; background: #e8ddd4; border-radius: 2px; margin-bottom: 5px; }
  .photo-full {
    width: 130px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .photo-full img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .photo-full::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to left, transparent 50%, rgba(255,255,255,.75) 100%);
    pointer-events: none;
  }
  .desktop-note {
    font-size: 0.68rem; color: #8b5e3c;
    margin-top: 0.5rem;
    padding-left: 0.5rem;
    border-left: 2px solid #b07848;
  }

  /* Mobile preview */
  .phone-wrap {}
  .phone-shell {
    background: #e8ddd4;
    border-radius: 18px;
    padding: 6px;
    max-width: 200px;
    margin: 0 auto;
    box-shadow: 0 4px 20px rgba(44,26,14,0.15);
  }
  .phone-screen {
    background: #faf6f0;
    border-radius: 13px;
    overflow: hidden;
  }
  /* Mobile: avatar layout */
  .mobile-bio {
    border-left: 3px solid #b07848;
    background: #fff;
    margin: 0.6rem;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(44,26,14,0.08);
  }
  .mobile-header {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem 0.75rem 0.6rem;
  }
  .avatar-ring {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid #b07848;
    box-shadow: 0 2px 8px rgba(176,120,72,0.25);
    flex-shrink: 0;
  }
  .avatar-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .mobile-identity {}
  .mobile-badge {
    display: inline-block;
    background: #f0e6d8; color: #8b5e3c;
    font-size: 0.52rem; font-weight: 700;
    padding: 0.1rem 0.4rem; border-radius: 8px;
    margin-bottom: 0.2rem;
  }
  .mobile-name { font-size: 0.9rem; font-weight: 700; color: #2c1a0e; line-height: 1.2; }
  .mobile-title { font-size: 0.58rem; color: #8b5e3c; margin-top: 0.05rem; }
  .mobile-body {
    padding: 0 0.75rem 0.75rem;
    border-top: 1px solid #f0e6d8;
  }
  .mobile-divider { height: 1px; background: #f0e6d8; margin: 0.5rem 0 0.45rem; }
  .mobile-lines div { height: 3.5px; background: #e8ddd4; border-radius: 2px; margin-bottom: 4px; }
  .mobile-note {
    font-size: 0.68rem; color: #8b5e3c;
    margin-top: 0.75rem;
    padding-left: 0.5rem;
    border-left: 2px solid #b07848;
    max-width: 200px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Size variants row */
  .size-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 2rem;
  }
  .size-card {
    background: #fff;
    border-radius: 10px;
    border: 2px solid transparent;
    box-shadow: 0 2px 10px rgba(44,26,14,0.07);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .size-card:hover { box-shadow: 0 4px 16px rgba(44,26,14,0.13); }
  .size-card.selected { border-color: #b07848; box-shadow: 0 4px 16px rgba(176,120,72,0.3); }
  .size-label {
    background: #2c1a0e; color: #f0e6d8;
    font-size: 0.66rem; font-weight: 700;
    padding: 0.35rem 0.7rem;
    letter-spacing: 0.05em;
  }
  .size-preview {
    padding: 0.7rem;
    background: #faf6f0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .size-preview .mini-bio {
    flex: 1;
    background: #fff;
    border-radius: 6px;
    border-left: 2.5px solid #b07848;
    padding: 0.5rem 0.55rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }
  .size-preview .mini-lines { flex: 1; }
  .size-preview .mini-lines div { height: 3.5px; background: #e8ddd4; border-radius: 2px; margin-bottom: 3.5px; }
  .size-desc {
    padding: 0.55rem 0.75rem;
    border-top: 1px solid #f0e6d8;
    font-size: 0.7rem; color: #6b4c30;
  }
  .size-desc strong { color: #2c1a0e; font-size: 0.75rem; display: block; margin-bottom: 0.15rem; }
</style>

<p class="page-title">桌機全圖 · 手機圓框頭像</p>
<p class="page-sub">確認整體方向，並選擇頭像大小</p>

<div class="layout">
  <!-- Desktop -->
  <div class="desktop-wrap">
    <div class="section-label">桌機版（維持全圖直式）</div>
    <div class="desktop-mock">
      <div class="bio-desktop">
        <div class="text-col">
          <span class="badge">課程負責人</span>
          <div class="name">林夏蘭</div>
          <div class="title">助理管理師</div>
          <div class="divider"></div>
          <div class="lines">
            <div style="width:90%"></div>
            <div style="width:85%"></div>
            <div style="width:88%"></div>
            <div style="width:70%"></div>
          </div>
        </div>
        <div class="photo-full">
          <img src="/images/lhl.png" alt="林夏蘭">
        </div>
      </div>
    </div>
    <div class="desktop-note">照片加寬 300px，左側強漸層融合</div>
  </div>

  <!-- Mobile -->
  <div class="phone-wrap">
    <div class="section-label" style="text-align:center">手機版（圓框頭像）</div>
    <div class="phone-shell">
      <div class="phone-screen">
        <div style="height:6px;background:#2c1a0e;display:flex;align-items:center;justify-content:center">
          <div style="width:30px;height:2px;background:#b07848;border-radius:1px"></div>
        </div>
        <div style="padding:0.4rem 0.5rem 0.5rem">
          <div class="mobile-bio">
            <div class="mobile-header">
              <div class="avatar-ring">
                <img src="/images/lhl.png" alt="林夏蘭">
              </div>
              <div class="mobile-identity">
                <div class="mobile-badge">課程負責人</div>
                <div class="mobile-name">林夏蘭</div>
                <div class="mobile-title">助理管理師</div>
              </div>
            </div>
            <div class="mobile-body">
              <div class="mobile-divider"></div>
              <div class="mobile-lines">
                <div style="width:95%"></div>
                <div style="width:90%"></div>
                <div style="width:88%"></div>
                <div style="width:75%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="mobile-note">小頭像居左，姓名職稱右側對齊</div>
  </div>
</div>

<!-- Avatar size picker -->
<h3 style="margin-top:2rem;font-size:0.9rem;color:#2c1a0e">頭像大小</h3>
<p class="subtitle" style="margin-bottom:1rem">選擇手機版圓框的尺寸</p>

<div class="size-row">
  <div class="size-card" data-choice="s" onclick="toggleSelect(this)">
    <div class="size-label">小（56px）</div>
    <div class="size-preview">
      <div class="mini-bio">
        <div style="width:28px;height:28px;border-radius:50%;overflow:hidden;border:2px solid #b07848;flex-shrink:0">
          <img src="/images/lhl.png" style="width:100%;height:100%;object-fit:cover;object-position:top center">
        </div>
        <div class="mini-lines" style="flex:1">
          <div style="width:80%"></div>
          <div style="width:70%"></div>
          <div style="width:75%"></div>
        </div>
      </div>
    </div>
    <div class="size-desc"><strong>56px</strong>偏小，名片感，重心在文字</div>
  </div>

  <div class="size-card" data-choice="m" onclick="toggleSelect(this)">
    <div class="size-label">中（72px）— 推薦</div>
    <div class="size-preview">
      <div class="mini-bio">
        <div style="width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #b07848;flex-shrink:0">
          <img src="/images/lhl.png" style="width:100%;height:100%;object-fit:cover;object-position:top center">
        </div>
        <div class="mini-lines" style="flex:1">
          <div style="width:80%"></div>
          <div style="width:70%"></div>
          <div style="width:75%"></div>
        </div>
      </div>
    </div>
    <div class="size-desc"><strong>72px</strong>平衡感最佳，臉部清晰可辨</div>
  </div>

  <div class="size-card" data-choice="l" onclick="toggleSelect(this)">
    <div class="size-label">大（88px）</div>
    <div class="size-preview">
      <div class="mini-bio">
        <div style="width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid #b07848;flex-shrink:0">
          <img src="/images/lhl.png" style="width:100%;height:100%;object-fit:cover;object-position:top center">
        </div>
        <div class="mini-lines" style="flex:1">
          <div style="width:80%"></div>
          <div style="width:70%"></div>
          <div style="width:75%"></div>
        </div>
      </div>
    </div>
    <div class="size-desc"><strong>88px</strong>照片很顯眼，略佔空間</div>
  </div>
</div>
